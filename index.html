<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driventic — Return Request</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #111111;
    --white: #ffffff;
    --gray-50: #f8f8f8;
    --gray-100: #f0f0f0;
    --gray-200: #e0e0e0;
    --gray-400: #aaaaaa;
    --gray-600: #666666;
    --gray-800: #333333;
    --accent: #111111;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #f4f4f4;
    color: var(--black);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f4f4;
  }
  .login-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-logo { height: 36px; margin-bottom: 1.75rem; }
  .login-card h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .login-card p { font-size: 13px; color: var(--gray-600); margin-bottom: 1.5rem; }
  .login-card label { display: block; text-align: left; font-size: 12px; font-weight: 500; color: var(--gray-600); margin-bottom: 5px; }
  .login-card input[type="password"] {
    width: 100%; padding: 9px 12px; border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 12px;
    outline: none; transition: border-color 0.15s;
  }
  .login-card input[type="password"]:focus { border-color: var(--black); }
  .login-error { font-size: 12px; color: #c0392b; margin-bottom: 10px; min-height: 16px; }
  .btn-login {
    width: 100%; padding: 10px; background: var(--black); color: var(--white);
    border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-login:hover { opacity: 0.85; }

  /* ── APP SHELL ── */
  #app { display: none; }
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 2rem;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-logo { height: 28px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .ref-pill {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    background: var(--gray-100); color: var(--gray-800);
    padding: 4px 10px; border-radius: 99px;
  }
  .progress-bar-wrap { height: 3px; background: var(--gray-100); }
  .progress-bar { height: 3px; background: var(--black); width: 0%; transition: width 0.35s ease; }

  /* ── FORM LAYOUT ── */
  .form-outer { max-width: 780px; margin: 2rem auto; padding: 0 1.5rem 4rem; }
  .form-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .section-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-icon {
    width: 28px; height: 28px;
    background: var(--gray-100);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .section-head h2 { font-size: 13px; font-weight: 600; }
  .section-body { padding: 18px 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--gray-600); }
  .field input, .field select, .field textarea {
    padding: 8px 11px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    color: var(--black);
    background: var(--white);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--black); }
  .field textarea { resize: vertical; min-height: 68px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }

  /* ── ITEMS TABLE ── */
  .items-header {
    display: grid;
    grid-template-columns: 2fr 90px 80px 90px 36px;
    gap: 8px;
    padding: 0 0 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray-400);
    border-bottom: 1px solid var(--gray-100);
  }
  .item-row {
    display: grid;
    grid-template-columns: 2fr 90px 80px 90px 36px;
    gap: 8px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .item-row:last-child { border-bottom: none; }
  .item-row input {
    padding: 7px 10px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    color: var(--black);
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .item-row input:focus { border-color: var(--black); }
  .btn-remove {
    width: 30px; height: 30px;
    border: none; background: none;
    cursor: pointer; color: var(--gray-400);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }
  .btn-remove:hover { background: #fef2f2; color: #c0392b; }
  .btn-add-item {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 12px;
    padding: 7px 14px;
    border: 1px dashed var(--gray-400);
    border-radius: var(--radius-sm);
    background: none;
    font-size: 13px;
    font-family: inherit;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-add-item:hover { border-color: var(--black); color: var(--black); background: var(--gray-50); }

  /* ── REASON CHIPS ── */
  .reason-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .reason-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--gray-800);
    transition: all 0.15s;
    background: var(--white);
    user-select: none;
  }
  .reason-chip input[type="radio"] { accent-color: var(--black); width: 14px; height: 14px; flex-shrink: 0; }
  .reason-chip:hover { border-color: var(--black); background: var(--gray-50); }
  .reason-chip.selected { border-color: var(--black); background: var(--gray-50); font-weight: 500; }

  /* ── ACTIONS ── */
  .actions-bar {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
  }
  .actions-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-400); margin-bottom: 12px; }
  .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-export {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 0;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--black); color: var(--white); border: 1.5px solid var(--black); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: var(--white); color: var(--black); border: 1.5px solid var(--black); }
  .btn-secondary:hover { background: var(--gray-50); }
  .btn-reset {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; margin-top: 10px;
    padding: 8px;
    border: none; background: none;
    font-size: 13px; font-family: inherit;
    color: var(--gray-400);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }
  .btn-reset:hover { color: var(--gray-600); background: var(--gray-50); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--black); color: var(--white);
    padding: 10px 20px; border-radius: 99px;
    font-size: 13px; font-family: inherit;
    transition: transform 0.25s ease;
    z-index: 999; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .reason-grid { grid-template-columns: 1fr 1fr; }
    .actions-grid { grid-template-columns: 1fr; }
    .items-header, .item-row { grid-template-columns: 1fr 70px 60px 80px 32px; }
    .topbar { padding: 0 1rem; }
    .form-outer { padding: 0 0.75rem 3rem; }
  }
</style>
</head>

  <div class="form-outer">

    <!-- Customer details -->
    <div class="form-card">
      <div class="section-head">
        <div class="section-icon">👤</div>
        <h2>Customer details</h2>
      </div>
      <div class="section-body">
        <div class="grid-2">
          <div class="field"><label>Full name</label><input id="cust-name" type="text" placeholder="Jane Smith" oninput="update()"></div>
          <div class="field"><label>Email address</label><input id="cust-email" type="email" placeholder="jane@example.com" oninput="update()"></div>
        </div>
        <div class="grid-2 mt-12">
          <div class="field"><label>Phone number</label><input id="cust-phone" type="tel" placeholder="+44 7700 000000" oninput="update()"></div>
          <div class="field"><label>Order number</label><input id="order-num" type="text" placeholder="ORD-00000" oninput="update()"></div>
        </div>
        <div class="field mt-12"><label>Customer shipping address</label><textarea id="cust-addr" placeholder="Street, City, Postcode" oninput="update()" style="min-height:56px"></textarea></div>
      </div>
    </div>

    <!-- Items -->
    <div class="form-card">
      <div class="section-head">
        <div class="section-icon">📦</div>
        <h2>Items being returned</h2>
      </div>
      <div class="section-body">
        <div class="items-header">
          <div>Product / description</div><div>SKU</div><div>Qty</div><div>Unit price</div><div></div>
        </div>
        <div id="items-list"></div>
        <button class="btn-add-item" onclick="addItem()">＋ Add item</button>
      </div>
    </div>

    <!-- Reason -->
    <div class="form-card">
      <div class="section-head">
        <div class="section-icon">💬</div>
        <h2>Reason for return</h2>
      </div>
      <div class="section-body">
        <div class="reason-grid">
          <label class="reason-chip" onclick="selectReason(this)"><input type="radio" name="reason" value="Faulty / defective"> Faulty / defective</label>
          <label class="reason-chip" onclick="selectReason(this)"><input type="radio" name="reason" value="Wrong item sent"> Wrong item sent</label>
          <label class="reason-chip" onclick="selectReason(this)"><input type="radio" name="reason" value="Damaged in transit"> Damaged in transit</label>
          <label class="reason-chip" onclick="selectReason(this)"><input type="radio" name="reason" value="No longer needed"> No longer needed</label>
          <label class="reason-chip" onclick="selectReason(this)"><input type="radio" name="reason" value="Incorrect size / fit"> Incorrect size / fit</label>
          <label class="reason-chip" onclick="selectReason(this)"><input type="radio" name="reason" value="Other"> Other</label>
        </div>
        <div class="field mt-12"><label>Additional notes</label><textarea id="notes" placeholder="Any further details about this return…" oninput="update()"></textarea></div>
      </div>
    </div>

    <!-- Resolution -->
    <div class="form-card">
      <div class="section-head">
        <div class="section-icon">✅</div>
        <h2>Resolution &amp; processing</h2>
      </div>
      <div class="section-body">
        <div class="grid-3">
          <div class="field"><label>Preferred resolution</label>
            <select id="resolution" onchange="update()">
              <option value="">— select —</option>
              <option>Full refund</option>
              <option>Exchange / replacement</option>
              <option>Store credit</option>
              <option>Repair</option>
            </select>
          </div>
          <div class="field"><label>Condition of goods</label>
            <select id="condition" onchange="update()">
              <option value="">— select —</option>
              <option>Unopened / sealed</option>
              <option>Opened, unused</option>
              <option>Used — good</option>
              <option>Used — damaged</option>
            </select>
          </div>
          <div class="field"><label>Processed by</label><input id="agent" type="text" placeholder="Staff name" oninput="update()"></div>
        </div>
      </div>
    </div>

    <!-- Export actions -->
    <div class="actions-bar">
      <div class="actions-title">Export documents</div>
      <div class="actions-grid">

        <button class="btn-export btn-secondary" onclick="exportDoc('customer')">⬇ Customer packing slip</button>
      </div>

// ── AUTH ──
function doLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === TEAM_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

// ── INIT ──
let itemCount = 0;
let refNum = '';
let today = '';

function initApp() {
  refNum = 'RMA-' + Date.now().toString(36).toUpperCase().slice(-6);
  today = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
  document.getElementById('ref-display').textContent = refNum;
  addItem();
}

// ── ITEMS ──
function addItem() {
  itemCount++;
  const id = itemCount;
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = 'item-' + id;
  row.innerHTML =
    '<input type="text" placeholder="Product name / description" oninput="update()">' +
    '<input type="text" placeholder="SKU-000" oninput="update()">' +
    '<input type="number" placeholder="1" min="1" value="1" oninput="update()">' +
    '<input type="number" placeholder="0.00" min="0" step="0.01" oninput="update()">' +
    '<button class="btn-remove" onclick="removeItem(' + id + ')" title="Remove">×</button>';
  document.getElementById('items-list').appendChild(row);
  update();
}

function removeItem(id) {
  const el = document.getElementById('item-' + id);
  if (el) el.remove();
  update();
}

function getItems() {
  return Array.from(document.querySelectorAll('#items-list .item-row')).map(r => {
    const inp = r.querySelectorAll('input');
    return { name: inp[0].value || '', sku: inp[1].value || '', qty: inp[2].value || '1', price: inp[3].value || '' };
  }).filter(i => i.name);
}

function selectReason(el) {
  document.querySelectorAll('.reason-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  update();
}

function getReason() {
  const r = document.querySelector('input[name="reason"]:checked');
  return r ? r.value : '';
}

// ── PROGRESS ──
function update() {
  const fields = [
    document.getElementById('cust-name').value,
    document.getElementById('cust-email').value,
    document.getElementById('order-num').value,
    document.getElementById('cust-addr').value,
    getReason(),
    document.getElementById('resolution').value,
    document.getElementById('condition').value,
  ];
  const pct = Math.round(fields.filter(f => f).length / fields.length * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

// ── RESET ──
function resetForm() {
  if (!confirm('Clear all form data and start a new return?')) return;
  ['cust-name','cust-email','cust-phone','order-num','cust-addr','notes','agent'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('resolution').value = '';
  document.getElementById('condition').value = '';
  document.getElementById('items-list').innerHTML = '';
  document.querySelectorAll('.reason-chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('input[name="reason"]').forEach(r => r.checked = false);
  itemCount = 0;
  refNum = 'RMA-' + Date.now().toString(36).toUpperCase().slice(-6);
  today = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
  document.getElementById('ref-display').textContent = refNum;
  addItem();
}

// ── PDF EXPORT ──
function exportDoc(type) {
  const name = document.getElementById('cust-name').value;
  if (!name) { toast('Please enter a customer name first'); return; }
  const items = getItems();
  if (!items.length) { toast('Please add at least one item'); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, m = 16, cw = W - m * 2;
  const BLACK = '#111111', GRAY = '#666666', LGRAY = '#e0e0e0', BG = '#f8f8f8';

  // load logo image
  const logoImg = new Image();
  logoImg.src = LOGO_B64;

  if (type === 'company') {
    // ── COMPANY COPY ──
    // Header bar
    doc.setFillColor(17, 17, 17);
    doc.rect(0, 0, W, 28, 'F');

    // Logo (white on black – invert not possible in jspdf so we place it small)
    try { doc.addImage(logoImg, 'PNG', m, 6, 48, 16); } catch(e) {}

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(8); doc.setFont('helvetica', 'normal');
    doc.text('INTERNAL — RETURN AUTHORISATION', W - m, 10, { align: 'right' });
    doc.setFontSize(10); doc.setFont('helvetica', 'bold');
    doc.text(refNum, W - m, 18, { align: 'right' });
    doc.setFontSize(8); doc.setFont('helvetica', 'normal');
    doc.text(today, W - m, 24, { align: 'right' });

    let y = 36;

    const sectionHead = (label) => {
      doc.setFillColor(240, 240, 240);
      doc.rect(m, y, cw, 7, 'F');
      doc.setTextColor(100, 100, 100); doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
      doc.text(label.toUpperCase(), m + 3, y + 5);
      doc.setTextColor(17, 17, 17);
      y += 11;
    };

    const row2 = (l1, v1, l2, v2) => {
      const hw = cw / 2 - 3;
      doc.setFontSize(8); doc.setFont('helvetica', 'normal');
      doc.setTextColor(100, 100, 100); doc.text(l1, m, y);
      doc.setTextColor(17, 17, 17); doc.text(v1 || '—', m + 34, y);
      if (l2 !== undefined) {
        doc.setTextColor(100, 100, 100); doc.text(l2, m + hw + 4, y);
        doc.setTextColor(17, 17, 17); doc.text(v2 || '—', m + hw + 38, y);
      }
      y += 6;
    };

    sectionHead('Customer details');
    row2('Name:', document.getElementById('cust-name').value, 'Email:', document.getElementById('cust-email').value);
    row2('Phone:', document.getElementById('cust-phone').value, 'Order no:', document.getElementById('order-num').value);
    doc.setFontSize(8); doc.setFont('helvetica', 'normal');
    doc.setTextColor(100, 100, 100); doc.text('Address:', m, y);
    doc.setTextColor(17, 17, 17);
    const addrLines = doc.splitTextToSize(document.getElementById('cust-addr').value || '—', cw - 36);
    doc.text(addrLines, m + 34, y);
    y += addrLines.length * 5 + 4;

    sectionHead('Items to be returned');
    const colW = [cw * 0.42, cw * 0.16, cw * 0.12, cw * 0.15, cw * 0.15];
    const headers = ['Product / description', 'SKU', 'Qty', 'Unit price', 'Line total'];
    doc.setFillColor(17, 17, 17); doc.rect(m, y, cw, 7, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
    let cx = m + 2;
    headers.forEach((h, i) => { doc.text(h, cx, y + 5); cx += colW[i]; });
    y += 7;

    let grandTotal = 0;
    items.forEach((it, idx) => {
      doc.setFillColor(idx % 2 === 0 ? 248 : 255, idx % 2 === 0 ? 248 : 255, idx % 2 === 0 ? 248 : 255);
      doc.rect(m, y, cw, 6.5, 'F');
      const lineTotal = ((parseFloat(it.qty) || 1) * (parseFloat(it.price) || 0)).toFixed(2);
      grandTotal += (parseFloat(it.qty) || 1) * (parseFloat(it.price) || 0);
      doc.setTextColor(17, 17, 17); doc.setFontSize(8); doc.setFont('helvetica', 'normal');
      cx = m + 2;
      const vals = [it.name, it.sku || '—', it.qty, it.price ? '£' + parseFloat(it.price).toFixed(2) : '—', '£' + lineTotal];
      vals.forEach((v, i) => { doc.text(String(v), cx, y + 4.5); cx += colW[i]; });
      y += 6.5;
    });

    doc.setFillColor(17, 17, 17); doc.rect(m, y, cw, 7, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(8); doc.setFont('helvetica', 'bold');
    doc.text('Total return value', m + 2, y + 5);
    doc.text('£' + grandTotal.toFixed(2), m + cw - 2, y + 5, { align: 'right' });
    y += 13;

    sectionHead('Return details');
    row2('Reason:', getReason(), 'Resolution:', document.getElementById('resolution').value);
    row2('Condition:', document.getElementById('condition').value, 'Processed by:', document.getElementById('agent').value);
    const notes = document.getElementById('notes').value;
    if (notes) {
      doc.setFontSize(8); doc.setFont('helvetica', 'normal');
      doc.setTextColor(100, 100, 100); doc.text('Notes:', m, y);
      doc.setTextColor(17, 17, 17);
      const nl = doc.splitTextToSize(notes, cw - 36);
      doc.text(nl, m + 34, y); y += nl.length * 5 + 4;
    }
    y += 6;

    sectionHead('Authorisation');
    y += 6;
    doc.setDrawColor(200, 200, 200);
    doc.line(m, y + 10, m + 74, y + 10);
    doc.line(m + 88, y + 10, m + 162, y + 10);
    doc.setFontSize(7.5); doc.setTextColor(140, 140, 140);
    doc.text('Authorised signature', m, y + 14);
    doc.text('Date', m + 88, y + 14);

    // Footer
    doc.setFontSize(7); doc.setTextColor(160, 160, 160);
    doc.text('Driventic UK Limited — Internal use only — ' + refNum, m, 288);
    doc.text(today, W - m, 288, { align: 'right' });

    doc.save('Driventic-RMA-Company-' + refNum + '.pdf');
    toast('✓ Company copy downloaded');

  } else {
    // ── CUSTOMER PACKING SLIP ──
    // Header
    doc.setFillColor(17, 17, 17);
    doc.rect(0, 0, W, 30, 'F');
    try { doc.addImage(logoImg, 'PNG', m, 7, 44, 15); } catch(e) {}
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(8); doc.setFont('helvetica', 'normal');
    doc.text('RETURNS PACKING SLIP', W - m, 11, { align: 'right' });
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text(refNum, W - m, 20, { align: 'right' });
    doc.setFontSize(7.5); doc.setFont('helvetica', 'normal');
    doc.text(today, W - m, 27, { align: 'right' });

    let y = 38;

    // Reference highlight box
    doc.setFillColor(240, 240, 240);
    doc.rect(m, y, cw, 26, 'F');
    doc.setTextColor(100, 100, 100); doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
    doc.text('YOUR RETURN REFERENCE — quote this in all correspondence', m + 4, y + 6);
    doc.setTextColor(17, 17, 17); doc.setFontSize(20); doc.setFont('helvetica', 'bold');
    doc.text(refNum, m + 4, y + 19);
    y += 32;

    const slip_section = (label) => {
      doc.setFillColor(17, 17, 17); doc.rect(m, y, cw, 7, 'F');
      doc.setTextColor(255, 255, 255); doc.setFontSize(8); doc.setFont('helvetica', 'bold');
      doc.text(label, m + 3, y + 5);
      doc.setTextColor(17, 17, 17);
      y += 10;
    };

    const slip_row = (label, val) => {
      doc.setFontSize(8); doc.setFont('helvetica', 'normal');
      doc.setTextColor(100, 100, 100); doc.text(label, m, y);
      doc.setTextColor(17, 17, 17); doc.text(val || '—', m + 28, y);
      y += 5.5;
    };

    slip_section('Your details');
    slip_row('Name:', document.getElementById('cust-name').value);
    slip_row('Email:', document.getElementById('cust-email').value);
    slip_row('Order no:', document.getElementById('order-num').value);
    y += 4;

    slip_section('Items in this return');
    const iColW = [cw * 0.55, cw * 0.22, cw * 0.23];
    doc.setFillColor(17, 17, 17); doc.rect(m, y, cw, 6, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
    cx = m + 2;
    ['Description', 'SKU', 'Qty'].forEach((h, i) => { doc.text(h, cx, y + 4.2); cx += iColW[i]; });
    y += 6;
    items.forEach((it, idx) => {
      doc.setFillColor(idx % 2 === 0 ? 248 : 255, idx % 2 === 0 ? 248 : 255, idx % 2 === 0 ? 248 : 255);
      doc.rect(m, y, cw, 6, 'F');
      doc.setTextColor(17, 17, 17); doc.setFontSize(8); doc.setFont('helvetica', 'normal');
      cx = m + 2;
      [it.name, it.sku || '—', it.qty].forEach((v, i) => { doc.text(String(v), cx, y + 4.2); cx += iColW[i]; });
      y += 6;
    });
    y += 8;

    slip_section('Reason for return');
    doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.setTextColor(17, 17, 17);
    doc.text(getReason() || '—', m, y); y += 6;
    const notes = document.getElementById('notes').value;
    if (notes) {
      doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 100, 100);
      const nl = doc.splitTextToSize(notes, cw);
      doc.text(nl, m, y); y += nl.length * 5 + 4;
    }
    y += 6;

    slip_section('How to return your items');
    const steps = [
      '1.  Pack items securely in appropriate packaging.',
      '2.  Place this slip inside the parcel before sealing.',
      '3.  Attach your returns label to the outside of the box.',
      '4.  Drop off at any authorised carrier location.'
    ];
    doc.setFontSize(8.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(17, 17, 17);
    steps.forEach(s => { doc.text(s, m + 2, y); y += 6.5; });
    y += 6;

    // Return address box
    slip_section('Return to address');
    doc.setFontSize(8.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(17, 17, 17);
    RETURN_ADDRESS.forEach(line => { doc.text(line, m + 2, y); y += 5.5; });
    y += 8;

    // Contact line
    doc.setFontSize(7.5); doc.setTextColor(100, 100, 100);
    doc.text('Questions? Contact us quoting your reference: ' + refNum, m, y);

    // Footer
    doc.setFontSize(7); doc.setTextColor(160, 160, 160);
    doc.text('Driventic UK Limited  ·  CV47 0FT', m, 288);
    doc.text(today, W - m, 288, { align: 'right' });

    doc.save('Driventic-Returns-Slip-' + refNum + '.pdf');
    toast('✓ Customer slip downloaded');
  }
}
</script>
</body>
</html>
